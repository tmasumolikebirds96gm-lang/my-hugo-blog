<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }} | 豊福 雅哉{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  
  {{ if .Description }}
    <meta name="description" content="{{ .Description }}">
  {{ else if .IsPage }}
    <meta name="description" content="{{ .Summary | plainify }}">
  {{ end }}

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background-color: #f7f7f5 !important; 
      color: #333 !important;
      font-size: 18px; 
      font-family: "Georgia", "Times New Roman", "游明朝", "YuMincho", serif !important;
      min-height: 100vh;
      display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes imgFade { from { opacity: 0; } to { opacity: 1; } }

    main { 
      flex: 1; 
      animation: fadeIn 0.8s ease-out forwards; 
    }

    img {
      max-width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
      animation: imgFade 1s ease-out forwards;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 40px; width: 100%; }
    
    header { 
      text-align: center; 
      padding: 50px 0 30px; 
      position: relative;
    }
    header h1 { 
      letter-spacing: 0.35em; 
      font-weight: normal; 
      font-size: 3.2rem;
      margin-bottom: 40px; 
      line-height: 1.2;
      display: block;
      transform: translateY(15px); 
    }
    header h1 a { text-decoration: none; color: #1a1a1a; transition: opacity 0.3s; }
    header h1 a:hover { opacity: 0.7; }

    nav ul { 
      list-style: none; 
      display: flex; 
      justify-content: center; 
      gap: 40px; 
    }
    nav ul li a { 
      font-size: 0.95rem; 
      color: #555 !important; 
      letter-spacing: 0.2em; 
      text-decoration: none; 
      text-transform: uppercase; 
      transition: all 0.3s;
      font-weight: 500;
    }
    nav ul li a:hover { color: #1a1a1a !important; }

    .menu-btn, .menu-icon { display: none; }

    .photo-grid {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 40px 0;
      width: 100%;
    }
    .photo-grid > a, .photo-grid > img {
      display: block;
      flex: 1;
    }

    .btn-archive {
      position: relative; 
      display: inline-block; 
      padding: 20px 70px;
      border: 1px solid #bbb; 
      color: #444; 
      font-family: 'Georgia', serif;
      letter-spacing: 0.3em; 
      text-transform: uppercase; 
      font-size: 0.95rem; 
      text-decoration: none; 
      overflow: hidden; 
      transition: all 0.4s; 
      z-index: 1;
    }
    .btn-archive:hover { color: #fff; border-color: #333; }
    .btn-archive::before { 
      content: ""; 
      position: absolute; 
      top: 0; 
      left: -100%; 
      width: 100%; 
      height: 100%; 
      background: #333; 
      transition: left 0.5s ease-in-out; 
      z-index: -1; 
    }
    .btn-archive:hover::before { left: 0; }

    @media (max-width: 900px) {
      header h1 { 
        font-size: 1.6rem; 
        letter-spacing: 0.12em; 
        transform: none; 
        margin-bottom: 20px;
        white-space: nowrap; 
      }
      
      nav {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background-color: #f7f7f5;
        padding: 20px 0;
        z-index: 100;
        box-shadow: 0 10px 15px rgba(0,0,0,0.05);
      }
      nav ul { flex-direction: column; align-items: center; gap: 25px; }
      .menu-btn:checked ~ nav { display: block; }

      .menu-icon { display: inline-block; cursor: pointer; padding: 10px; margin-bottom: 10px; }
      .navicon { background: #333; display: block; height: 1px; width: 25px; position: relative; }
      .navicon:before, .navicon:after { background: #333; content: ''; display: block; height: 100%; width: 100%; position: absolute; transition: all .2s ease-out; }
      .navicon:before { top: 8px; }
      .navicon:after { top: -8px; }
      .menu-btn:checked ~ .menu-icon .navicon { background: transparent; }
      .menu-btn:checked ~ .menu-icon .navicon:before { top: 0; transform: rotate(45deg); }
      .menu-btn:checked ~ .menu-icon .navicon:after { top: 0; transform: rotate(-45deg); }

      .photo-grid {
        flex-direction: column !important;
        align-items: center !important;
        gap: 40px !important;
      }
      .photo-grid > a, .photo-grid img {
        width: 100% !important;
      }
    }

    footer { background-color: #0d0d0d !important; color: #fff !important; padding: 100px 0; text-align: center; margin-top: 100px; width: 100%; }
    .footer-sns { display: flex; justify-content: center; align-items: center; gap: 40px; margin-bottom: 40px; }
    .footer-sns a { color: #fff !important; text-decoration: none; font-size: 1rem; letter-spacing: 0.2em; opacity: 0.85; transition: all 0.3s; border-bottom: 1px solid transparent; padding-bottom: 4px; }
    .footer-sns a:hover { opacity: 1; border-bottom: 1px solid #fff; }
    .footer-copy { font-size: 0.8rem; letter-spacing: 0.15em; opacity: 0.7; line-height: 2.5; }
  </style>
</head>
<body>
  <header class="container">
    <h1><a href="{{ "/" | relURL }}">{{ .Site.Title }}</a></h1>
    <input type="checkbox" id="menu-btn" class="menu-btn">
    <label for="menu-btn" class="menu-icon"><span class="navicon"></span></label>
    <nav>
      <ul>
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL | relURL }}">{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </header>

  <main>
    <div class="container">
      {{ block "main" . }}{{ end }}
    </div>
  </main>

  <footer>
    <div class="footer-sns">
      <a href="{{ .Site.Params.x_url | default "#" }}" target="_blank" rel="noopener">X</a>
      <span class="sep" style="color: #666;">/</span>
      <a href="{{ .Site.Params.portfolio_url | default "#" }}" target="_blank" rel="noopener">PORTFOLIO</a>
    </div>
    <div class="footer-copy">
      <p>&copy; {{ now.Year }} 豊福 雅哉/Masaya Toyofuku ({{ .Site.Title }})</p>
      <p>掲載画像の無断転載・二次利用を固く禁じます。</p>
    </div>
  </footer>

  <script>
    document.addEventListener('contextmenu', function(e) {
      if (e.target.nodeName === 'IMG') { e.preventDefault(); }
    }, false);
  </script>
</body>
</html>
